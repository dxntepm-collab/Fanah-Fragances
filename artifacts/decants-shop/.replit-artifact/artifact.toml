kind = "web"
previewPath = "/"
title = "Decants Perfumes"
version = "1.0.0"
id = "artifacts/decants-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22798

[services.development]
run = "pnpm --filter @workspace/decants-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/decants-shop", "run", "build" ]
publicDir = "artifacts/decants-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22798"
BASE_PATH = "/"
